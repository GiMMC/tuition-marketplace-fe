name: cicd-production

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image PROD
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tuition-marketplace-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tuition-marketplace-fe:prod-${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          script: |
            cd /opt/app/tuition-marketplace-fe
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tuition-marketplace-fe:latest
            docker compose up -d --remove-orphans
            docker image prune -f
